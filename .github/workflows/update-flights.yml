name: Atualizar dados de voos

on:
  schedule:
    # Roda 1x por dia ao meio-dia UTC (plano gratuito: 100 chamadas/mes)
    # Para mais aeroportos ou frequencia, atualize para um plano pago
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install requests

      - name: Buscar dados na AviationStack
        run: python scripts/fetch_flights.py
        env:
          # Para plano gratuito (100 chamadas/mes): use apenas 1 aeroporto
          # Para mais aeroportos, atualize o plano em aviationstack.com
          AIRPORTS: ${{ vars.AIRPORTS || 'SBCA' }}
          AVIATIONSTACK_KEY: ${{ secrets.AVIATIONSTACK_KEY }}

      - name: Commitar JSONs atualizados
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: atualiza dados de voos [skip ci]"
          file_pattern: data/*.json
